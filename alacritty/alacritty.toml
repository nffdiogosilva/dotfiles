import = [
  "/Users/ichigo/.config/alacritty/themes/dracula.toml",
  "/Users/ichigo/.config/alacritty/fonts.toml"
]
live_config_reload = true

[cursor]
##unfocused_hollow = false

[cursor.style]
blinking = "On"
shape = "Block"

[env]
TERM = "alacritty"
WINIT_X11_SCALE_FACTOR = "1.0"

[[keyboard.bindings]]
chars = "\u001BF"
key = "Right"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001BB"
key = "Left"
mods = "Alt"

[window]
decorations = "buttonless"
dynamic_title = true
# history = 10000
# multiplier = 3
opacity = 1.0
startup_mode = "Windowed"

[window.dimensions]
columns = 400
lines = 200

[window.padding]
x = 10
y = 10
